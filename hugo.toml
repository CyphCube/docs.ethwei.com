baseURL = "https://docs.ethwei.com/"
title = "Ethwei Docs"
theme = "book"
enableGitInfo = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[params]
  BookTheme = "dark"
  BookToC = true
  BookFlatSection = false
  BookSearch = true
  BookLogo = "/logo.png"
  BookSection = "docs"

[languages]
  [languages.en]
    contentDir = "content"
    languageName = "English"
    locale = "en-us"
    title = "Ethwei Docs"
    weight = 1
  [languages.zh]
    contentDir = "content.zh"
    languageName = "中文"
    locale = "zh-cn"
    title = "以太维文档"
    weight = 2
  [languages.ko]
    contentDir = "content.ko"
    languageName = "한국어"
    locale = "ko-kr"
    title = "이더웨이 문서"
    weight = 3
  [languages.ja]
    contentDir = "content.ja"
    languageName = "日本語"
    locale = "ja-jp"
    title = "イーサウェイ ドキュメント"
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
